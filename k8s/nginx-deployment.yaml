apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-nginx
  labels:
    app: weather-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-nginx
  template:
    metadata:
      labels:
        app: weather-nginx
    spec:
      containers:
        - name: weather-nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: weather-nginx-conf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-nginx-conf
data:
  default.conf: |
    server {
        listen 80;
        location / {
            proxy_pass http://weather-frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/v1/weather {
            proxy_pass http://weather-service-a:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-From-Nginx "true";  
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }