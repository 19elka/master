apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-service-a
  template:
    metadata:
      labels:
        app: weather-service-a
    spec:
      containers:
        - name: weather-service-a
          image: service-a:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "service-a"
            - name: REDIS_HOST
              value: "host.minikube.internal"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "host.minikube.internal:29092"
            - name: GRPC_SERVICE_B_HOST
              value: weather-service-b.default.svc.cluster.local
            - name: GRPC_SERVICE_B_PORT
              value: "9090"