apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-service-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-service-a
  template:
    metadata:
      labels:
        app: weather-service-a
    spec:
      containers:
        - name: weather-service-a
          image: weather-app:1.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "service-a"
            - name: REDIS_HOST
              value: "host.minikube.internal"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "host.minikube.internal:29092"
            - name: GRPC_SERVICE_B_HOST
              value: "weather-service-b"
            - name: GRPC_SERVICE_B_PORT
              value: "9090"